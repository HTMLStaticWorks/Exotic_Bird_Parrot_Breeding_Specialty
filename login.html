<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Indus Aviary Member Portal</title>
    <meta name="description" content="Sign in to your Indus Aviary account to track active clutch requests, manage memberships, and talk to aviculture consultants.">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>

    <!-- Auth Wrapper -->
    <section class="auth-wrapper">
        <!-- Auth Controls (RTL & Theme) -->
        <div class="auth-controls">
            <button class="theme-toggle btn-auth-action" aria-label="Toggle Theme">
                <i class="bi bi-moon-fill"></i>
            </button>
            <button class="rtl-toggle btn-auth-action" aria-label="Toggle RTL">RTL</button>
        </div>

        <div class="auth-card glass-card p-4 p-md-5 my-5">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand justify-content-center fs-3 fw-bold mb-2 d-inline-flex text-decoration-none">
                    <i class="bi bi-feather text-primary"></i> <span class="text-primary">Indus</span> <span class="text-main">Aviary</span>
                </a>
                <h4 class="fw-bold mb-1 mt-2 text-main">Welcome Back</h4>
                <p class="small text-muted">Sign in to manage your aviary services</p>
            </div>

            <form id="loginForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label small fw-bold text-muted">Email Address</label>
                    <input type="email" class="form-control bg-main border border-secondary py-2 rounded-3" id="loginEmail" placeholder="name@example.com" required>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label small fw-bold text-muted">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control bg-main border border-secondary py-2 rounded-3" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" id="passwordToggle" aria-label="Toggle Password Visibility">
                            <i class="bi bi-eye-slash-fill"></i>
                        </button>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                </div>

                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check mb-0">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none forgot-password-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-premium w-100 py-2.5 mb-4">Sign In</button>

                <div class="text-center mb-4">
                    <span class="small text-muted px-2 bg-main position-relative" style="z-index: 1;">Or Sign In With</span>
                    <hr class="mt-2" style="margin-top: -10px !important;">
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="social-login-btn"><i class="bi bi-google"></i> Google</button>
                    <button type="button" class="social-login-btn"><i class="bi bi-apple"></i> Apple</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register here</a></p>
            </div>
        </div>
    </section>

    <!-- Success Modal -->
    <div class="modal fade" id="authSuccessModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-main border-0 shadow-lg rounded-4">
                <div class="modal-body p-5 text-center">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mt-4 mb-3">Logged In Successfully!</h3>
                    <p class="text-muted mb-4">Welcome back to Indus Aviary. Redirecting to your dashboard portal...</p>
                    <button type="button" class="btn btn-premium btn-sm" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>

    <!-- Login specific validation & toggle script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const passToggle = document.getElementById('passwordToggle');
            const passInput = document.getElementById('loginPassword');
            const successModal = new bootstrap.Modal(document.getElementById('authSuccessModal'));

            // Password Toggle logic
            passToggle.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                
                const icon = passToggle.querySelector('i');
                if(type === 'text') {
                    icon.classList.remove('bi-eye-slash-fill');
                    icon.classList.add('bi-eye-fill');
                } else {
                    icon.classList.remove('bi-eye-fill');
                    icon.classList.add('bi-eye-slash-fill');
                }
            });

            // Validation logic
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                e.stopPropagation();

                if (form.checkValidity()) {
                    successModal.show();
                    form.reset();
                    form.classList.remove('was-validated');
                } else {
                    form.classList.add('was-validated');
                }
            });
        });
    </script>
</body>

</html>
